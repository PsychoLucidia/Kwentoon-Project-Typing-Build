<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Kwentoon: Mr. Bu's The Typing Nook</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="stylesheet" href="MyStyles/ImageStyles.css">
    <link rel="stylesheet" href="MyStyles/mobilewarning.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="750" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <!-- <div id="unity-fullscreen-button"></div> -->
        <div id="unity-build-title">Mr. Bu's The Typing Nook</div>
      </div>
    </div>
    <script>
      /* =========================================================
      * DOM REFERENCES & GLOBAL VARIABLES
      * ========================================================= */
      var canvas = document.querySelector("#unity-canvas");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Kwentoon-Project-Typing-Build.loader.js";

      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Kwentoon-Project-Typing-Build.data",
        frameworkUrl: buildUrl + "/Kwentoon-Project-Typing-Build.framework.js",
        codeUrl: buildUrl + "/Kwentoon-Project-Typing-Build.wasm",
        memoryUrl: buildUrl + "/",
        symbolsUrl: buildUrl + "/",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Mr. Bu's The Typing Nook",
        productVersion: "1.0.1",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // config.matchWebGLToCanvasSize = false;
      // config.autoSyncPersistentDataPath = true;


      /* =========================================================
      * UI HELPERS (BANNERS / WARNINGS)
      * ========================================================= */

      // Shows temporary or permanent messages on screen
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");

        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }

        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type == 'error') {
          div.style = 'background: red; padding: 10px;';
        } else {
          if (type == 'warning') {
            div.style = 'background: yellow; padding: 10px;';
          }

          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }


      /* =========================================================
      * UNITY RUNTIME LOADING
      * ========================================================= */

      function runUnity() {
        document.querySelector("#unity-loading-bar").style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
          })
          .then((unityInstance) => {
            document.querySelector("#unity-loading-bar").style.display = "none";

            // document.querySelector("#unity-fullscreen-button").onclick = () => {
            //   unityInstance.SetFullscreen(1);
            // };

          })
          .catch((message) => {
            alert(message);
          });
        };

        document.body.appendChild(script);
      }


      /* =========================================================
      * MOBILE WARNING UI
      * ========================================================= */

      function showMobileWarning() {
        var warningDiv = document.createElement("div");
        warningDiv.className = "unity-mobile-warning";
        warningDiv.id = "warning-formatting";

        var logo = document.getElementsByClassName("logo-div-in-flex")[0];
        warningDiv.appendChild(logo);

        var header = document.createElement("h2");
        header.innerHTML = "Best experience on desktop";
        warningDiv.appendChild(header);

        var message = document.createElement("p");
        message.innerHTML = "This game is made for desktop and is not optimized for mobile devices.";
        warningDiv.appendChild(message);

        var breakElement = document.createElement("br");
        warningDiv.appendChild(breakElement);

        var message2 = document.createElement("p");
        message2.innerHTML = "You may proceed to play on mobile with a keyboard connected.";
        warningDiv.appendChild(message2);

        var playAnywayBtn = document.createElement("button");
        playAnywayBtn.textContent = "Play Anyway";

        playAnywayBtn.onclick = () => {
          warningDiv.style.display = "none";
          setupMobileRuntime();
        };

        warningDiv.appendChild(playAnywayBtn);

        document.body.appendChild(warningDiv);
        warningDiv.style.display = "flex";
      }


      /* =========================================================
      * MOBILE RUNTIME SETUP
      * ========================================================= */

      function setupMobileRuntime() {

        const container = document.querySelector("#unity-container");
        container.style.display = "flex";

        // Remove desktop-only UI
        var unityFooter = document.getElementById("unity-footer");

        var unityLogo = document.getElementById("unity-logo-title-footer");
        unityFooter.removeChild(unityLogo);

        var buildTitle = document.getElementById("unity-build-title");
        unityFooter.removeChild(buildTitle);

        // var fullscreenButton = document.getElementById("unity-fullscreen-button");
        // unityFooter.removeChild(fullscreenButton);

        // Remove warning screen
        var mobileWarning = document.getElementsByClassName("unity-mobile-warning")[0];
        mobileWarning.remove();

        // Maintain aspect ratio
        function resizeToAspectRatio() {
          let aspectRatio = 5 / 4;

          let screenWidth = window.innerWidth;
          let screenHeight = window.innerHeight;
          let screenAspectRatio = screenWidth / screenHeight;

          let targetWidth, targetHeight;

          if (screenAspectRatio > aspectRatio) {
            targetHeight = screenHeight;
            targetWidth = screenHeight * aspectRatio;
          } else {
            targetWidth = screenWidth;
            targetHeight = screenWidth / aspectRatio;
          }

          canvas.style.width = targetWidth + "px";
          canvas.style.height = targetHeight + "px";

          container.style.width = targetWidth + "px";
          container.style.height = targetHeight + "px";
        }

        window.addEventListener("resize", resizeToAspectRatio);
        resizeToAspectRatio();

        config.matchWebGLToCanvasSize = false;

        runUnity();
      }

      function setupDesktopRuntime() {
        canvas.style.width = "750px";
        canvas.style.height = "600px";
        
        runUnity();
      }


      /* =========================================================
      * ENTRY POINT (DEVICE DETECTION)
      * ========================================================= */

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.head.appendChild(meta);

        let gameLogoMobile = document.createElement("div");
        gameLogoMobile.className = "logo-div-in-flex";  
        document.body.appendChild(gameLogoMobile);

        let gameLogo = document.createElement("img");
        gameLogo.id = "game-logo";
        gameLogo.src = "MyStyles/logo.png";
        gameLogoMobile.appendChild(gameLogo);

        showMobileWarning();

        var unityContainer = document.querySelector("#unity-container");
        if (unityContainer) {
          unityContainer.style.display = "none";
        }

        // Mobile style (future support)
        // document.getElementsByTagName('head')[0].appendChild(meta);
        // document.querySelector("#unity-container").className = "unity-mobile";
        // canvas.className = "unity-mobile";

        // config.devicePixelRatio = 1;

      } else {
        setupDesktopRuntime();
      }

    </script>    
  </body>
</html>
